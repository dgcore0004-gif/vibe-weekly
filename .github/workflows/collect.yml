name: Weekly Trend Collection

on:
  schedule:
    # 매주 금요일 오전 9시 KST (= UTC 00:00)
    - cron: "0 0 * * 5"
  workflow_dispatch: # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install script dependencies
        run: npm ci
        working-directory: scripts

      - name: Run collection script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/collect.mjs

      - name: Build site
        run: npm run build

      - name: Commit updated data
        run: |
          git config user.name "Vibe Weekly Bot"
          git config user.email "bot@vibeweekly.dev"
          git add public/data.json
          git diff --staged --quiet || git commit -m "chore: weekly trend update $(date +'%Y-W%V')"
          git push
